name: Postar Instagram HAV

on:
  workflow_dispatch: {}
  schedule:
    # Horarios "redondos" (ex: 21:00 UTC) sofrem fila/atraso maior no GitHub
    # Actions por concentrarem gatilhos de varios repositorios. Por isso o
    # horario alvo (18h Brasilia = 21:00 UTC) usa minuto deslocado, e ha
    # duas tentativas de reforco depois. O script so publica 1x/dia
    # (ja_postou_hoje), entao rodar de novo mais tarde e seguro: se o
    # primeiro disparo ja publicou, os seguintes so pulam sem fazer nada.
    - cron: "7 21 * * *"   # ~18h07 Brasilia - tentativa principal
    - cron: "37 21 * * *"  # ~18h37 Brasilia - reforco 1
    - cron: "22 22 * * *"  # ~19h22 Brasilia - reforco 2

permissions:
  contents: write

jobs:
  postar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Postar proximo da fila
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ID: ${{ secrets.IG_BUSINESS_ID }}
        run: python postar_instagram.py

      - name: Commitar fila atualizada
        run: |
          git config user.name "hav-instagram-bot"
          git config user.email "actions@github.com"
          git add fila-postagem.txt ultimo_post.txt
          git diff --staged --quiet || git commit -m "chore: marca post como publicado"
          git push
